<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Survey - Page 2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Step 2: Your Preferences</h2>
    <form action="page3.html" method="get">
      <label>Favorite Season:</label>
      <select name="season">
        <option>Spring</option>
        <option>Summer</option>
        <option>Autumn</option>
        <option>Winter</option>
      </select>

      <label>Do you enjoy online surveys?</label>
      <input type="radio" name="enjoy" value="Yes"> Yes
      <input type="radio" name="enjoy" value="No"> No

      <div class="progress">Progress: 66%</div>
      <button type="submit" class="btn">Next ➡️</button>
    </form>
  </div>
</body>
</html>
