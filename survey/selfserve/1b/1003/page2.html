<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Survey - Page 2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Page 2: Preferences</h2>
    <form action="page3.html" method="get">
      <label>Favorite Color:</label>
      <select name="color">
        <option>Green</option>
        <option>Blue</option>
        <option>Red</option>
        <option>Yellow</option>
      </select>
      
      <label>Do you enjoy online surveys?</label>
      <input type="radio" name="enjoy" value="Yes"> Yes
      <input type="radio" name="enjoy" value="No"> No
      
      <button type="submit" class="btn">Next</button>
    </form>
  </div>
</body>
</html>
