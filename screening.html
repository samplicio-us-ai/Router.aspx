<!DOCTYPE html>
<html>
<head>
  <title>You Qualify!</title>
  <link rel="stylesheet" href="style.css">
  <script>
    let countdown = 10; // seconds
    function startCountdown() {
      const message = document.getElementById("message");
      message.innerHTML = "✅ You qualify!<br>Redirecting in " + countdown + " seconds...";
      const timer = setInterval(() => {
        countdown--;
        message.innerHTML = "✅ You qualify!<br>Redirecting in " + countdown + " seconds...";
        if (countdown <= 0) {
          clearInterval(timer);
          // Redirect to your chosen survey
          window.location.href = "https://samplicio-us-ai.github.io/Survey/survey/selfserve/111c/1005/";
        }
      }, 1000);
    }
    window.onload = startCountdown;
  </script>
</head>
<body>
  <main>
    <h2 id="message">✅ You qualify!<br>Redirecting in 10 seconds...</h2>
  </main>
</body>
</html>
